version: "3.9"

volumes:
  mlflow_data:
  model_store:

services:

  # ── 1. MLflow Tracking Server ──────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 2. Trainer ────────────────────────────────────────────────────────────
  trainer:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: xgb_trainer
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATA_PATH=/app/data/sensor_data.csv
      - MODEL_DIR=/app/model
    volumes:
      - model_store:/app/model
    restart: "no"

  # ── 3. Inference API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: prediction_api
    depends_on:
      - trainer
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/model
    volumes:
      - model_store:/app/model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
